apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-app
  namespace: release-lab

spec:
  replicas: 2

  selector:
    matchLabels:
      app: inventory-app

  template:
    metadata:
      labels:
        app: inventory-app

    spec:
      containers:
      - name: inventory-app

        image: inventory-app:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 5000