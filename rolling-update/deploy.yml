apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-app
  namespace: release-lab
  labels:
    app: release-app
    strategy: rolling
    version: v1
    owner: devops-team

spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: release-app
      strategy: rolling

  template:
    metadata:
      labels:
        app: release-app
        strategy: rolling
        version: v1

    spec:
      containers:
        - name: release-app
          image: release-lab:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: VERSION
              value: "V1"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3