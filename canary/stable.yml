apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable
  namespace: release-lab
  labels:
    app: release-app
    strategy: canary
    release: stable
    version: v1
    owner: devops-team
spec:
  replicas: 9
  selector: 
    matchLabels:
      app: release-app
      strategy: canary
      release: stable
  template:
    metadata:
      labels:
        app: release-app
        strategy: canary
        release: stable
        version: v1
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: release-app
          image: release-lab:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: VERSION
              value: "v1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
